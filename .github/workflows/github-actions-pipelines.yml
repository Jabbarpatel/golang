name: CI/CD pipelines to build frontend and backend

on:
  push:
    tags: ["v*"]
    branches: ["main"]

jobs:
  build-frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Bun environment
        uses: oven-sh/setup-bun@v1

      - name: Install frontend dependancy
        working-directory: ./development/frontend
        run: bun install

      - name: Frontend lint errors
        working-directory: ./development/frontend
        run: bun lint

      - name: Frontend typescript errors
        working-directory: ./development/frontend
        run: bun tsc

      - name: Build frontend
        working-directory: ./development/frontend
        run: bun run build

  build-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up of GO version
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.4"

      - name: Compile all GO packages
        working-directory: ./development/backend
        run: go build ./...

  build-docker-images:
    needs:
      - build-frontend
      - build-backend
    runs-on: ubuntu-latest
    env:
      FRONTEND_IMAGE: ${{secrets.FRONTEND_IMAGE}}
      BACKEND_IMAGE: ${{secrets.BACKEND_IMAGE}}

    steps:
      - name: Login to docker HUB
        if: startsWith(github.ref, 'refs/tags/v')
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push frontend image to docker HUB
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          docker build -t $FRONTEND_IMAGE:${GITHUB_REF_NAME} ./development/frontend
          docker push $FRONTEND_IMAGE:${GITHUB_REF_NAME}
          docker build -t $BACKEND_IMAGE:${GITHUB_REF_NAME} ./development/backend
          docker push $BACKEND_IMAGE:${GITHUB_REF_NAME}
